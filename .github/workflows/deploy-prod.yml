name: Deploy to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: env.GHCR_TOKEN == ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Login to GHCR
        if: env.GHCR_TOKEN != ''
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Determine Registry and Repo
        id: registry
        run: |
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "BACKEND_REPO=ghcr.io/${{ github.repository }}/backend" >> $GITHUB_ENV
            echo "FRONTEND_REPO=ghcr.io/${{ github.repository }}/frontend" >> $GITHUB_ENV
          else
            echo "BACKEND_REPO=${{ secrets.DOCKERHUB_USERNAME }}/irf-backend" >> $GITHUB_ENV
            echo "FRONTEND_REPO=${{ secrets.DOCKERHUB_USERNAME }}/irf-frontend" >> $GITHUB_ENV
          fi

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ env.BACKEND_REPO }}:${{ github.sha }},${{ env.BACKEND_REPO }}:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ env.FRONTEND_REPO }}:${{ github.sha }},${{ env.FRONTEND_REPO }}:latest

  run-migrations:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check for Migration Job Secret
        env:
          RENDER_JOB_ID_MIGRATE: ${{ secrets.RENDER_JOB_ID_MIGRATE }}
        run: |
          if [ -z "$RENDER_JOB_ID_MIGRATE" ]; then
            echo "Error: RENDER_JOB_ID_MIGRATE secret is missing."
            echo "Please create a Job on Render to run 'alembic upgrade head' and save its ID as a secret."
            exit 1
          fi

      - name: Make script executable
        run: chmod +x scripts/render_poll_run.sh

      - name: Trigger and Poll Migration Job
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_JOB_ID_MIGRATE: ${{ secrets.RENDER_JOB_ID_MIGRATE }}
        run: ./scripts/render_poll_run.sh "$RENDER_API_KEY" "$RENDER_JOB_ID_MIGRATE"

  render-deploy:
    needs: run-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_BACKEND }}
        run: |
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
             IMG="ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
          else
             IMG="${{ secrets.DOCKERHUB_USERNAME }}/irf-backend:${{ github.sha }}"
          fi
          
          echo "Deploying Backend Image: $IMG"
          
          curl -f -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"$IMG\"}"

      - name: Deploy Frontend to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_FRONTEND }}
        run: |
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
             IMG="ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}"
          else
             IMG="${{ secrets.DOCKERHUB_USERNAME }}/irf-frontend:${{ github.sha }}"
          fi
          
          echo "Deploying Frontend Image: $IMG"
          
          curl -f -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"$IMG\"}"

  post-deploy-smoke-tests:
    needs: render-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets
        env:
          DEPLOY_BACKEND_URL: ${{ secrets.DEPLOY_BACKEND_URL }}
          TEST_ADMIN_USERNAME: ${{ secrets.TEST_ADMIN_USERNAME }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          if [ -z "$DEPLOY_BACKEND_URL" ] || [ -z "$TEST_ADMIN_USERNAME" ] || [ -z "$TEST_ADMIN_PASSWORD" ]; then
             echo "Error: Missing required secrets for smoke tests."
             echo "Ensure DEPLOY_BACKEND_URL, TEST_ADMIN_USERNAME, and TEST_ADMIN_PASSWORD are set."
             exit 1
          fi

      - name: Wait for Service Warm-up
        run: sleep 30

      - name: Run Smoke Tests
        env:
          DEPLOY_BACKEND_URL: ${{ secrets.DEPLOY_BACKEND_URL }}
          TEST_ADMIN_USERNAME: ${{ secrets.TEST_ADMIN_USERNAME }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          echo "1. Checking Healthz..."
          HEALTH=$(curl -s -f "${DEPLOY_BACKEND_URL}/healthz")
          echo "Response: $HEALTH"
          if [[ "$HEALTH" != *"status"* ]]; then
            echo "Health check failed."
            exit 1
          fi
          
          echo "2. Testing Login..."
          LOGIN_RESP=$(curl -s -f -X POST "${DEPLOY_BACKEND_URL}/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$TEST_ADMIN_USERNAME\", \"password\": \"$TEST_ADMIN_PASSWORD\"}")
          
          TOKEN=$(echo "$LOGIN_RESP" | jq -r .access_token)
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
             echo "Login failed. Response: $LOGIN_RESP"
             exit 1
          fi
          echo "Login successful. Token received."
          
          echo "3. Checking Reports Summary..."
          SUMMARY_RESP=$(curl -s -f -H "Authorization: Bearer $TOKEN" "${DEPLOY_BACKEND_URL}/reports/summary")
          echo "Response: $SUMMARY_RESP"
          
          if [[ "$SUMMARY_RESP" != *"total_items"* ]]; then
             echo "Reports summary check failed."
             exit 1
          fi
          
          echo "Smoke tests passed!"

      - name: Rollback on Failure
        if: failure() && secrets.RENDER_ROLLBACK_SECRET != ''
        run: |
          echo "Smoke tests failed. Triggering rollback (Not fully implemented, placeholder)."
          # Implement rollback logic here if Render supports API rollback or use a webhook
